<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="./public/favicon-32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/css/style.css">
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main class="container">
        <img class="nft__img" src="./src/img/image-equilibrium.jpg" alt="NFT__Img">
      <section class="card__description">
        <h1>Equilibrium #3429</h1>
        <P class="main-text">Our Equilibrium collection promotes balance and calm.</P>
        <div class="nft__desc">
          <div class="right">
            <img src="./src/img/icon-ethereum.svg" alt="Ethereum__Icon">
            <p>  0.041 ETH </p>
          </div>
          <div class="left">
            <img src="./src/img/icon-clock.svg" alt="clock__icon"> 
              <p> 3 days left </p>
          </div>
        </div>
        <div class="nft__creator">
          <img src="./src/img/image-avatar.png" alt="profile_pic">
          <p> <span>Creation of</span> Jules Wyvern</p>
        </div>
      </section>
    </main>


    <!-- <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">devwhnry</a>.
    </div> -->

    <script type="module" src="./src/js/main.js"></script>

  </body>
</html>
